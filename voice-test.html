<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>음성인식 테스트</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#EEF4F4;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;gap:24px;}
.card{background:white;border-radius:20px;padding:32px;width:100%;max-width:480px;text-align:center;}
.title{font-size:22px;font-weight:900;color:#13302D;margin-bottom:8px;}
.sub{font-size:15px;color:#527470;margin-bottom:32px;}
.mic-btn{
  width:120px;height:120px;border-radius:50%;
  border:none;font-size:48px;cursor:pointer;
  background:#2BADA0;transition:all .2s;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 24px;
}
.mic-btn.on{background:#E05A2B;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.08);}}
.status{font-size:16px;font-weight:700;color:#527470;margin-bottom:24px;min-height:24px;}
.result-box{
  background:#EEF4F4;border-radius:14px;padding:20px;
  min-height:80px;font-size:28px;font-weight:900;
  color:#13302D;display:flex;align-items:center;justify-content:center;
  margin-bottom:16px;letter-spacing:2px;
}
.raw-box{font-size:14px;color:#527470;min-height:20px;}
.log{margin-top:20px;text-align:left;max-height:200px;overflow-y:auto;}
.log-item{padding:8px 12px;border-bottom:1px solid #EEF4F4;font-size:14px;}
.log-item .raw{color:#999;}
.log-item .converted{color:#2BADA0;font-weight:700;}
.clear-btn{margin-top:12px;background:#F4F4F4;color:#666;border:none;border-radius:10px;padding:10px 20px;font-size:14px;cursor:pointer;font-family:inherit;}
</style>
</head>
<body>

<div class="card">
  <div class="title">🎤 음성인식 테스트</div>
  <div class="sub">버튼을 탭하고 신청ID를 말해보세요<br>예) "이구칠오" → 2975</div>

  <button class="mic-btn" id="micBtn" onclick="toggleMic()">🎤</button>
  <div class="status" id="status">탭해서 시작</div>

  <div class="result-box" id="result">—</div>
  <div class="raw-box" id="rawResult"></div>

  <div class="log" id="log"></div>
  <button class="clear-btn" onclick="clearLog()">기록 지우기</button>
</div>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if(!SpeechRecognition){
  document.querySelector('.sub').textContent = '❌ 이 브라우저는 음성인식을 지원하지 않아요. 크롬으로 열어주세요.';
  document.getElementById('micBtn').disabled = true;
}

const rec = SpeechRecognition ? new SpeechRecognition() : null;
if(rec){
  rec.lang = 'ko-KR';
  rec.continuous = true;
  rec.interimResults = true;
}

let isOn = false;

function toggleMic(){
  if(!rec)return;
  if(isOn){
    rec.stop();
    isOn = false;
    document.getElementById('micBtn').classList.remove('on');
    document.getElementById('micBtn').textContent = '🎤';
    document.getElementById('status').textContent = '탭해서 시작';
  } else {
    rec.start();
    isOn = true;
    document.getElementById('micBtn').classList.add('on');
    document.getElementById('micBtn').textContent = '⏹';
    document.getElementById('status').textContent = '🔴 듣고 있어요...';
  }
}

if(rec){
  rec.onresult = (e) => {
    let interim = '';
    let final = '';
    for(let i = e.resultIndex; i < e.results.length; i++){
      const t = e.results[i][0].transcript;
      if(e.results[i].isFinal) final += t;
      else interim += t;
    }

    const display = final || interim;
    document.getElementById('rawResult').textContent = '인식된 텍스트: ' + display;

    // 숫자 변환
    const converted = convertToNumber(display);
    document.getElementById('result').textContent = converted || display;

    if(final){
      addLog(final, converted);
    }
  };

  rec.onerror = (e) => {
    document.getElementById('status').textContent = '오류: ' + e.error;
  };

  rec.onend = () => {
    if(isOn){
      // 자동 재시작 (continuous mode 유지)
      rec.start();
    }
  };
}

function convertToNumber(text){
  // 한국어 숫자 → 아라비아 숫자
  const map = {
    '영':0,'공':0,'제로':0,
    '일':1,'하나':1,'한':1,
    '이':2,'두':2,'둘':2,
    '삼':3,'셋':3,'세':3,
    '사':4,'넷':4,'네':4,
    '오':5,'다섯':5,
    '육':6,'여섯':6,
    '칠':7,'일곱':7,
    '팔':8,'여덟':8,
    '구':9,'아홉':9
  };

  // 이미 숫자면 그대로
  if(/^\d+$/.test(text.trim())) return text.trim();

  // 한글 숫자 변환 시도
  let result = text.trim();
  // 띄어쓰기 제거
  result = result.replace(/\s/g,'');
  // 한글 → 숫자
  let converted = '';
  let i = 0;
  while(i < result.length){
    let matched = false;
    // 두 글자 먼저 시도
    if(i+1 < result.length){
      const two = result.slice(i,i+2);
      if(map[two] !== undefined){
        converted += map[two];
        i += 2;
        matched = true;
      }
    }
    if(!matched){
      const one = result[i];
      if(map[one] !== undefined){
        converted += map[one];
      } else {
        converted += one;
      }
      i++;
    }
  }
  return /^\d+$/.test(converted) ? converted : null;
}

function addLog(raw, converted){
  const log = document.getElementById('log');
  const item = document.createElement('div');
  item.className = 'log-item';
  item.innerHTML = `<span class="raw">"${raw}"</span> → <span class="converted">${converted||'변환 실패'}</span>`;
  log.insertBefore(item, log.firstChild);
}

function clearLog(){
  document.getElementById('log').innerHTML = '';
  document.getElementById('result').textContent = '—';
  document.getElementById('rawResult').textContent = '';
}
</script>
</body>
</html>
